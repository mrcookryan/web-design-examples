<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Elite Transportation Services logo — stylized road with motion lines inside a circular shield">
  <title>Elite Transportation Services Logo</title>
  <desc>Circular navy shield emblem with a teal stylized road and speed lines, representing premium chauffeured transportation services.</desc>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="#0b2545"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#0fb3a6" stroke-width="4"/>

  <!-- Inner lighter ring accent -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="rgba(15,179,166,0.25)" stroke-width="1.5"/>

  <!-- Road / path shape -->
  <path d="M 30 140 Q 60 100 100 96 Q 140 92 170 60" fill="none" stroke="#0fb3a6" stroke-width="10" stroke-linecap="round"/>

  <!-- Road center dashes -->
  <path d="M 48 128 Q 62 112 76 108" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 6"/>
  <path d="M 90 101 Q 110 96 130 87" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 6"/>

  <!-- Speed / motion chevrons (abstract vehicle arrow) -->
  <g transform="translate(100, 100) rotate(-30)">
    <path d="M -28 0 L 0 -14 L 28 0" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <path d="M -20 10 L 0 -4 L 20 10" fill="none" stroke="#0fb3a6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
    <path d="M -12 20 L 0 8 L 12 20" fill="none" stroke="#0fb3a6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>

  <!-- Star accent top-right -->
  <circle cx="148" cy="56" r="5" fill="#0fb3a6" opacity="0.85"/>
  <circle cx="148" cy="56" r="2.5" fill="#ffffff"/>

  <!-- Bottom text band -->
  <path id="bottomArc" d="M 20 130 A 82 82 0 0 0 180 130" fill="none"/>
  <text font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#ffffff" text-anchor="middle">
    <textPath href="#bottomArc" startOffset="50%">ELITE  •  TRANSPORT</textPath>
  </text>

  <!-- Top text arc -->
  <path id="topArc" d="M 22 100 A 78 78 0 0 1 178 100" fill="none"/>
  <text font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="4" fill="rgba(255,255,255,0.5)" text-anchor="middle">
    <textPath href="#topArc" startOffset="50%">PREMIUM CHAUFFEURED</textPath>
  </text>
</svg>
